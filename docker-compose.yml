services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      STOCKFISH_PATH: /usr/games/stockfish
    expose:
      - "8001"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      - backend
    ports:
      - "8080:80"
